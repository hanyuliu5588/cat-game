name: 构建并推送 Docker 镜像到阿里云 ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # 支持多平台构建（amd64 + arm64）
      - name: 设置 QEMU（支持 ARM 模拟）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: crpi-ebbvkvi11nuretfo.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 获取 Git Short Hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 构建并推送多平台镜像（amd64 + arm64）
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            crpi-ebbvkvi11nuretfo.cn-shanghai.personal.cr.aliyuncs.com/hanyuliu1/catgame:latest
            crpi-ebbvkvi11nuretfo.cn-shanghai.personal.cr.aliyuncs.com/hanyuliu1/catgame:${{ steps.vars.outputs.sha_short }}
