name: 构建并推送 Docker 镜像到阿里云 ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 登录阿里云容器镜像服务
        run: |
          docker login \
            --username=${{ secrets.ACR_USERNAME }} \
            --password=${{ secrets.ACR_PASSWORD }} \
            crpi-ebbvkvi11nuretfo.cn-shanghai.personal.cr.aliyuncs.com

      - name: 构建 Docker 镜像
        run: |
          docker build -t crpi-ebbvkvi11nuretfo.cn-shanghai.personal.cr.aliyuncs.com/hanyuliu1/catgame:latest .

      - name: 推送镜像到阿里云 ACR
        run: |
          docker push crpi-ebbvkvi11nuretfo.cn-shanghai.personal.cr.aliyuncs.com/hanyuliu1/catgame:latest
